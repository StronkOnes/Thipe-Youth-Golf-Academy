<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Thipe Youth Golf Academy (TYGA)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class', // Enable dark mode
        theme: {
          extend: {
            colors: {
              'tyga-primary': '#1E40AF', // A deep blue
              'tyga-secondary': '#10B981', // A vibrant green
              'tyga-accent': '#F59E0B', // A warm amber
              'tyga-dark': '#1F2937', // A dark gray for text
              'tyga-light': '#F9FAFB', // A very light gray for backgrounds
              'gray-950': '#0d1117',
            },
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              display: ['Playfair Display', 'serif'], // Add display font
            },
            animation: {
              'fade-in': 'fade-in 0.7s ease-in-out forwards',
              'fade-in-down': 'fade-in-down 0.7s ease-in-out forwards',
              'fade-in-up': 'fade-in-up 0.7s ease-in-out forwards',
              'ken-burns': 'ken-burns 15s ease-out infinite alternate-reverse',
            },
            keyframes: {
              'fade-in': {
                '0%': { opacity: '0' },
                '100%': { opacity: '1' },
              },
              'fade-in-down': {
                '0%': { opacity: '0', transform: 'translateY(-20px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              },
              'fade-in-up': {
                '0%': { opacity: '0', transform: 'translateY(20px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              },
              'ken-burns': {
                '0%': { transform: 'scale(1.05) translateY(0)' },
                '100%': { transform: 'scale(1.15) translateY(-15px)' },
              },
            },
          }
        }
      }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/heroicons/2.1.3/24/outline/styles.min.css" rel="stylesheet">
    <style>
        .text-shadow-lg { text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5); }
        .button-glow:hover { box-shadow: 0 0 15px 5px rgba(16, 185, 129, 0.4); }
        .card-glow:hover { box-shadow: 0 0 20px 8px rgba(30, 64, 175, 0.2); }
        .dark .card-glow:hover { box-shadow: 0 0 20px 8px rgba(30, 64, 175, 0.4); }
        .text-gradient {
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
    </style>
  <script type="importmap">
{
  "imports": {
    "react-router-dom": "https://esm.sh/react-router-dom@^7.8.1",
    "@vitejs/plugin-react": "https://esm.sh/@vitejs/plugin-react@^5.0.1",
    "react/": "https://esm.sh/react@^19.1.1/",
    "react": "https://esm.sh/react@^19.1.1",
    "react-dom/": "https://esm.sh/react-dom@^19.1.1/",
    "@google/genai": "https://esm.sh/@google/genai@^1.15.0",
    "vite": "https://esm.sh/vite@^7.1.3"
  }
}
</script>
</head>
  <body class="bg-tyga-light dark:bg-black">
    <div id="root"></div>
    <script type="module" src="/src/index.tsx"></script>
  </body>
</html>
